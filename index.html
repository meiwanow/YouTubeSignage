<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

    /* iframeを少し大きめにしてUIを画面外に追い出す */
    .wrap {
      position: fixed;
      top: -60px; left: -10px;
      width: calc(100vw + 20px);
      height: calc(100vh + 120px);
      pointer-events: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe
      src="https://www.youtube.com/embed/_9Fgq8Ib02w?autoplay=1&mute=1&loop=1&playlist=_9Fgq8Ib02w&controls=0&rel=0&showinfo=0&modestbranding=1&iv_load_policy=3&vq=hd1080"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
